<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Breaking Bad - Контакти</title>
    <style>
        body {
            font-family: Georgia, serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }

        h1 {
            font-size: 38px;
            color: #c8e600;
            text-decoration: underline;
            text-shadow: 2px 2px 8px #c8e600;
            letter-spacing: 3px;
            text-align: center;
        }

        nav {
            text-align: center;
            background-color: #2a2a2a;
            padding: 12px;
            border: 2px solid #c8e600;
            border-radius: 6px;
            margin-bottom: 30px;
        }

        nav a {
            margin: 10px;
            color: #c8e600;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            font-family: Arial, sans-serif;
        }

        nav a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        form {
            max-width: 580px;
            margin: 0 auto;
            padding: 25px;
            background-color: #222222;
            border: 3px solid #c8e600;
            border-radius: 10px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 18px;
            color: #c8e600;
            font-family: Arial, sans-serif;
            font-size: 15px;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 6px;
            border: 2px solid #c8e600;
            border-radius: 5px;
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-size: 15px;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        .radio-group {
            margin-top: 8px;
            text-align: left;
        }

        input[type="radio"] {
            margin-right: 6px;
            accent-color: #c8e600;
        }

        .radio-label {
            display: inline;
            color: #e0e0e0;
            font-weight: normal;
            font-family: Arial, sans-serif;
            font-size: 15px;
            margin-right: 20px;
        }

        input[type="submit"] {
            background-color: #c8e600;
            color: #1a1a1a;
            font-weight: bold;
            cursor: pointer;
            width: 160px;
            padding: 10px;
            margin-top: 22px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-family: Arial, sans-serif;
        }

        input[type="submit"]:hover {
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <h1>Свържете се с нас</h1>

    <nav>
        <a href="nachalo.html">Начало</a>
        <a href="info.html">Информация</a>
        <a href="galeria.html">Галерия</a>
        <a href="kontakti.html">Контакти</a>
    </nav>

    <form>

        <label for="ime">Име:</label>
        <input type="text" id="ime" name="ime" required>

        <label for="familiq">Фамилия:</label>
        <input type="text" id="familiq" name="familiq" required>

        <label for="komentar">Коментар:</label>
        <textarea id="komentar" name="komentar" rows="4" required></textarea>

        <label>Пол:</label>
        <div class="radio-group">
            <input type="radio" id="muj" name="pol" value="Мъж" required>
            <label for="muj" class="radio-label">Мъж</label>

            <input type="radio" id="jena" name="pol" value="Жена" required>
            <label for="jena" class="radio-label">Жена</label>
        </div>

        <label for="godini">Изберете години:</label>
        <select id="godini" name="godini" required>
            <option value="pod18">Под 18</option>
            <option value="18-25">18–25</option>
            <option value="26-35">26–35</option>
            <option value="36-50">36–50</option>
            <option value="nad50">Над 50</option>
        </select>

        <br>
        <input type="submit" value="Изпрати">

    </form>

</body>
</html>
